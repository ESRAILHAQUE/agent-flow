# =============================================================
# AgentFlow — GitHub Actions CI/CD Pipeline
# Deploys to Ubuntu VPS via SSH on push to main branch
# =============================================================

name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  # -------------------------------------------------------
  # Job 1: Run tests and type-check
  # -------------------------------------------------------
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @agentflow/database prisma generate

      - name: Type check (shared)
        run: pnpm --filter @agentflow/shared build

      - name: Type check (database)
        run: pnpm --filter @agentflow/database build

      - name: Type check (API)
        run: pnpm --filter @agentflow/api build

      - name: Type check (Web)
        run: pnpm --filter @agentflow/web build

  # -------------------------------------------------------
  # Job 2: Deploy to VPS via SSH
  # -------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to project directory
            cd /var/www/agent-flow

            echo "📥 Pulling latest changes..."
            git pull origin main

            echo "📦 Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "🔧 Generating Prisma client..."
            pnpm --filter @agentflow/database prisma generate

            echo "🗄️ Running database migrations..."
            pnpm --filter @agentflow/database prisma migrate deploy

            echo "🏗️ Building all packages..."
            pnpm --filter @agentflow/shared build
            pnpm --filter @agentflow/database build
            pnpm --filter @agentflow/api build
            pnpm --filter @agentflow/web build

            echo "🔄 Restarting services with PM2..."
            pm2 restart agentflow-api --update-env || pm2 start apps/api/dist/index.js --name agentflow-api
            pm2 restart agentflow-web --update-env || pm2 start pnpm --name agentflow-web -- --filter @agentflow/web start

            echo "💾 Saving PM2 process list..."
            pm2 save

            echo "✅ Deployment complete!"

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment to production succeeded!"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Commit: ${{ github.sha }}"
